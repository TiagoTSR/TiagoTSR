name: GitHub Stats Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=TiagoTSR&show_icons=true&theme=tokyonight&include_all_commits=true&locale=pt-br
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Top langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=TiagoTSR&theme=tokyonight&layout=compact&langs_count=9
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
